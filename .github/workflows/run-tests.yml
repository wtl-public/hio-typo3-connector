name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: "PHP ${{ matrix.php-version }} / TYPO3 ${{ matrix.typo3-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.3'
            typo3-version: '^12.4'
            testing-framework: '^7.0'
          - php-version: '8.4'
            typo3-version: '^13.4'
            testing-framework: '^8.2'
          

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: intl, mbstring, xml, pdo, sqlite3
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer require --no-interaction --no-progress --prefer-dist \
            "typo3/cms-core:${{ matrix.typo3-version }}" \
            "typo3/testing-framework:${{ matrix.testing-framework }}"

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite unit

