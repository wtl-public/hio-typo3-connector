routeEnhancers:
  HioPersonList:
    type: Extbase
    limitToPages: [13]
    extension: 'HioTypo3Connector'
    plugin: 'PersonList'
    routes:
      - routePath: '/'
        _controller: 'Person::index'
      - routePath: '/detail/{person}'
        _controller: 'Person::show'
        _arguments:
          person: 'person'
      - routePath: '/{page}'
        _controller: 'Person::index'
        _arguments:
          page: 'currentPageNumber'
    defaultController: 'Person::index'
    defaults:
      page: '1'
    aspects:
      person:
        type: PersistedAliasMapper
        tableName: tx_hiotypo3connector_domain_model_person
        routeFieldName: slug
      page:
        type: StaticRangeMapper
        start: '1'
        end: '1000'
